theme:
  name: material
  font:
    text: 'Titillium Web'
  logo: assets/nomad-logo.png
  favicon: assets/favicon.png
  features:
    - navigation.instant
    - navigation.footer
  icon:
    repo: fontawesome/brands/github
  palette:
    # Default to light mode
    - scheme: default
      # primary: '#2A4CDF'
      # accent: '#008A67'
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode option
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
plugins:
  - search
  - panzoom:
      key: alt
      always_show_hint: true
      hint_location: top
  - awesome-pages
  # - bibtex:
      # bib_file: docs/assets/refs.bib
markdown_extensions:
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences     :
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:          # ← REQUIRED for === "YAML"
      alternate_style: true
  - toc:
      permalink: True
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
extra_css:
  - stylesheets/extra.css
  #   - stylesheets/mermaid-zoom.css  # Disabled: using panzoom plugin
  #   - stylesheets/svg-diagram.css  # Disabled: using panzoom plugin
extra_javascript:
  - 'https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js'
  - 'https://unpkg.com/cytoscape@3.19.1/dist/cytoscape.min.js'
  - 'https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js'
  #   - assets/click-zoom.js  # Disabled: using panzoom plugin
  #   - assets/svg-pan-zoom-diagram.js  # Disabled: using panzoom plugin
  # - assets/code/parse.js
extra:
  version: 0.1
  generator: false
